<!DOCTYPE html>
<html>
<head>
    <title>F1 2026 Simulator</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 40px;">
    <h1>Welcome to the 2026 F1 Season</h1>
    
    <h2>Current Event: {{ race }}</h2>
    
    {% if error %}
        <p style="color: red;"><strong>⚠️ Error:</strong> {{ error }}</p>
    {% endif %}

    <form method="POST">
        <label>Enter the top {{ required }} drivers separated by commas:</label><br><br>
        <input type="text" name="drivers" style="width: 400px; padding: 5px;" required>
        <br><br>
        <button type="submit" style="padding: 10px 15px;">Submit Results</button>
    </form>

    <br><hr><br>
    
    <a href="/standings"><button style="padding: 10px 15px;">View Current Standings</button></a>
</body>
</html>
