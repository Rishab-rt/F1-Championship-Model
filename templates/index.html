<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 2026 Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow-sm border-0 mb-4 text-center p-4 bg-dark text-white">
            <h1 class="h3 mb-0">🏁 2026 F1 Season Simulator</h1>
        </div>

        <div class="alert alert-info text-center shadow-sm" role="alert">
            <h4 class="alert-heading mb-1">Current Event</h4>
            <strong class="fs-5">{{ race }}</strong>
        </div>
        
        {% if error %}
            <div class="alert alert-danger shadow-sm d-flex align-items-center" role="alert">
                <span>⚠️ <strong>Error:</strong> {{ error }}</span>
            </div>
        {% endif %}

        <div class="card shadow-sm p-4 mb-4">
            <form method="POST">
                <h5 class="mb-3 text-secondary">Select the Top {{ required }} Finishers:</h5>
                
                {% for i in range(1, required + 1) %}
                    <div class="input-group mb-3">
                        <span class="input-group-text bg-secondary text-white fw-bold" style="width: 55px;">P{{ i }}</span>
                        <select name="driver_{{ i }}" class="form-select" required>
                            <option value="" disabled selected>Choose a driver...</option>
                            {% for driver in driver_list %}
                                <option value="{{ driver }}">{{ driver }}</option>
                            {% endfor %}
                        </select>
                    </div>
                {% endfor %}
                
                <button type="submit" class="btn btn-success w-100 py-2 mt-2 fw-bold shadow-sm">Submit Results</button>
            </form>
        </div>

        <div class="text-center">
            <a href="/standings" class="btn btn-outline-primary shadow-sm px-4">📊 View Current Standings</a>
        </div>
    </div>

</body>
</html>
