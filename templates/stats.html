<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Season Stats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='f1.css') }}">
</head>
<body>
<div class="f1-container">

    <div class="f1-header">
        <h1>Season Stats</h1>
        <span class="race-badge">After {{ current_race_index }} races</span>
    </div>

    <div class="f1-card" style="margin-bottom: 16px;">
        <h5 class="section-label">Points Progression — Top 10</h5>
        <div style="position: relative; height: 400px;">
            <canvas id="statsChart"></canvas>
        </div>
    </div>

    <div style="margin-top: 16px;">
        <a href="/standings" class="btn-ghost-f1">Back to standings</a>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const teamColors = {
        "Leclerc":    "#DC0000",
        "Hamilton":   "#DC0000",
        "Norris":     "#FF8000",
        "Piastri":    "#FF8000",
        "Russell":    "#00D2BE",
        "Antonelli":  "#00D2BE",
        "Verstappen": "#1E41FF",
        "Hadjar":     "#1E41FF",
        "Sainz":      "#00A0DE",
        "Albon":      "#00A0DE",
        "Alonso":     "#006F62",
        "Stroll":     "#006F62",
        "Ocon":       "#B6BABD",
        "Bearman":    "#B6BABD",
        "Linblad":    "#1B3A6B",
        "Lawson":     "#1B3A6B",
        "Hulkenberg": "#E4002B",
        "Bortoleto":  "#E4002B",
        "Gasly":      "#0093CC",
        "Colapinto":  "#0093CC",
        "Perez":      "#CC0000",
        "Bottas":     "#CC0000"
    };

    const driverCodes = JSON.parse('{{ driver_codes | tojson | safe }}');
    const timelineData = JSON.parse('{{ timeline | tojson | safe }}');
    const raceLabels = JSON.parse('{{ race_labels | tojson | safe }}');

    const datasets = Object.entries(timelineData).map(([name, points]) => ({
        label: driverCodes[name] || name,
        data: points,
        borderColor: teamColors[name] || "#888888",
        backgroundColor: "transparent",
        borderWidth: 2,
        pointRadius: 4,
        pointHoverRadius: 6,
        tension: 0.3
    }));

    const ctx = document.getElementById('statsChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: raceLabels,
            datasets: datasets
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    labels: {
                        color: "#F0F0F0",
                        font: { family: 'Inter', size: 12 }
                    }
                },
                tooltip: {
                    backgroundColor: "#1A1A1A",
                    borderColor: "#333333",
                    borderWidth: 1,
                    titleColor: "#F0F0F0",
                    bodyColor: "#888888",
                    callbacks: {
                        title: (items) => raceLabels[items[0].dataIndex],
                        label: (item) => `${item.dataset.label}: ${item.raw} pts`
                    }
                }
            },
            scales: {
                x: {
                    ticks: {
                        color: "#888888",
                        font: { family: 'Inter', size: 11 },
                        maxRotation: 45
                    },
                    grid: { color: "#222222" }
                },
                y: {
                    ticks: {
                        color: "#888888",
                        font: { family: 'Inter', size: 11 }
                    },
                    grid: { color: "#222222" }
                }
            }
        }
    });
</script>
</body>
</html>
