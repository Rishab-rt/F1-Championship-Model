<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}F1 Simulator{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='f1.css') }}">
    
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% include 'navbar.html' %}
    
    <div class="f1-container" {% block container_style %}{% endblock %}>
        {% block content %}
        {% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
