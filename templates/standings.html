<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Championship Standings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5" style="max-width: 800px;">
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold">🏆 Current F1 Standings</h1>
        </div>

        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm p-3">
                    <h2 class="h4 mb-3 text-primary border-bottom pb-2">🏎️ Drivers' (WDC)</h2>
                    {{ wdc_table | safe }}
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card shadow-sm p-3">
                    <h2 class="h4 mb-3 text-success border-bottom pb-2">🏭 Constructors' (WCC)</h2>
                    {{ wcc_table | safe }}
                </div>
            </div>
        </div>

        <div class="text-center my-4">
            <a href="/" class="btn btn-dark shadow-sm px-4">↩️ Back to Race Input</a>
        </div>
    </div>
    
    <form action="/reset-season" method="POST" onsubmit="return confirm('Are you sure you want to completely wipe all standings and restart the 2026 season?');">
        <button type="submit" class="btn btn-danger btn-sm shadow-sm">
            🔄 Clear Database & Restart Season
        </button>
    </form>
</body>
</html>
